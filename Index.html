<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Evolution: Stress Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e11d48;
            --bg-light: #ffffff;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .start-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10vh;
        }
        .start-screen.hidden {
            display: none;
        }
        .start-btn {
            background: #000000;
            color: white;
            padding: 1.25rem 4rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            border: none;
        }
        #telemetry {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            font-family: 'JetBrains Mono', monospace;
            background: white;
            padding: 15px;
            border: 2px solid black;
            pointer-events: none;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <button id="start-btn" class="start-btn">Start Stress Test</button>
    </div>

    <div id="telemetry" style="display:none">
        <div>CORES DETECTED: <span id="core-count">0</span></div>
        <div>ACTIVE WORKERS: <span id="worker-count">0</span></div>
        <div>RAM ALLOCATED: <span id="ram-count">0</span> MB</div>
        <div>ENTITIES: <span id="ent-count">0</span></div>
        <div style="color: red; margin-top: 10px; font-weight: bold;">MAIN THREAD LOCKED: TRUE</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        
        const coreDisplay = document.getElementById('core-count');
        const workerDisplay = document.getElementById('worker-count');
        const ramDisplay = document.getElementById('ram-count');
        const entDisplay = document.getElementById('ent-count');

        let width, height;
        let particles = [];
        let memoryLeak = [];
        let totalAllocated = 0;
        let count = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class UHDParticle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 50 + 20;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 40;
                ctx.shadowColor = 'rgba(255, 0, 0, 0.8)';
                ctx.shadowOffsetX = 10;
                ctx.shadowOffsetY = 10;
                ctx.fillStyle = 'rgba(225, 29, 72, 0.5)';
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 10;
                ctx.strokeRect(this.x, this.y, this.size, this.size);
                ctx.restore();

                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
        }

        function initiateStress() {
            // 1. Core Detection & Worker Spawning (Background Threads)
            const cores = navigator.hardwareConcurrency || 4;
            const workerLimit = cores * 2;
            coreDisplay.innerText = cores;
            workerDisplay.innerText = workerLimit;

            const workerBlob = new Blob([`
                while(true) {
                    Math.sqrt(Math.random() * 1000000);
                }
            `], { type: 'application/javascript' });

            const workerUrl = URL.createObjectURL(workerBlob);
            for (let i = 0; i < workerLimit; i++) {
                new Worker(workerUrl);
            }

            // 2. Main Thread Lock + Memory Leak + High-End Rendering
            // We use a while(true) to completely hijack the browser process
            while (true) {
                // Allocation Spike (50MB chunks)
                // Since this is in a while(true), it will happen as fast as the CPU allows
                // We add a conditional to simulate the "every 200ms" feel if needed, 
                // but for a pure freeze, we just let it rip.
                if (count % 500 === 0) {
                    const chunk = new Float64Array(6250000);
                    for (let i = 0; i < chunk.length; i++) {
                        chunk[i] = Math.random();
                    }
                    memoryLeak.push(chunk);
                    totalAllocated += 50;
                    ramDisplay.innerText = totalAllocated;
                }

                // Entity Spawning
                const p = new UHDParticle();
                particles.push(p);
                count++;

                // Rendering
                // Note: The browser will not actually update the screen visually 
                // because the main thread never yields to the paint cycle.
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, width, height);
                for (let j = 0; j < Math.min(particles.length, 500); j++) {
                    particles[j].draw();
                }

                // Update Telemetry
                entDisplay.innerText = count.toLocaleString();

                // Intentional Main Thread Lock: 
                // There is no break, no await, and no requestAnimationFrame.
            }
        }

        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            document.getElementById('telemetry').style.display = 'block';
            // Use setTimeout to allow the UI to update "one last time" before total freeze
            setTimeout(initiateStress, 100);
        });
    </script>
</body>
</html>
